<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Lacerda Club</title>
    <style>
        /* --- ESTILOS BÁSICOS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; color: #333; }

        /* --- MENU LATERAL --- */
        .sidebar { width: 250px; background-color: #1e2b3c; color: #fff; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 24px; color: #e0a800; }
        .menu-items { list-style: none; }
        .menu-items li { padding: 15px 25px; cursor: pointer; transition: background 0.3s; }
        .menu-items li:hover, .menu-items li.active { background-color: #2c3e50; border-left: 4px solid #e0a800; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #1e2b3c; }
        .date { color: #777; font-weight: 500; }

        /* --- CONTROLE DE TELAS (JAVASCRIPT) --- */
        .page-section { display: none; /* Esconde todas as seções por padrão */ }
        .page-section.active { display: block; /* Mostra apenas a seção ativa */ }
